<body>

    <div class="hud p-3">
        <div class="flex justify-between items-start gap-2 max-w-4xl mx-auto">
            <div class="glass px-3 py-2.5 rounded-xl w-44 border border-red-900/20">

            <div class="glass px-3 py-2 rounded-xl w-44 border border-white/5 flex flex-col gap-1.5">
                <div class="flex justify-between items-center text-[8px] font-mono">
                    <span class="text-yellow-500 font-bold">🔦 FLASHLIGHT</span>
                    <span id="bat-text" class="text-white font-black">100%</span>
                </div>
                <div class="w-full h-1 bg-gray-950 rounded-full overflow-hidden">

        </div>
        
        <div id="boss-hud" class="hidden absolute top-16 left-1/2 -translate-x-1/2 w-64 glass p-2 rounded-lg border-t-2 border-red-700 shadow-xl shadow-red-950">
            <p class="text-[8px] text-red-600 font-black text-center mb-1 uppercase tracking-widest italic animate-pulse">⚠️ COLOSSAL AMALGAM UNLEASHED ⚠️</p>
            <div class="w-full h-2 bg-gray-950 rounded-full overflow-hidden p-[1px] border border-white/5"><div id="boss-hp" class="h-full bg-gradient-to-r from-red-800 to-red-600 w-full transition-all duration-100"></div></div>

    <div id="joystick-base"><div id="joystick-knob"></div></div>

    <script type="module">
        let scene, camera, renderer, player, clock, ambLight, sun, spotLight;
        let otherPlayers = {}, zombies = {}, bullets = [], enemyProjectiles = [], batteryDrops = [];
        let joystick = { active: false, x: 0, y: 0 };
        let health = 100, currentLevel = 1, myId = "P_" + Math.floor(Math.random()*9999);
        let isDowned = false, lastLookX = 0, visibilityRange = 70;
        let flashlightPower = true, batteryLife = 100.0;
        let audioCtx = null, masterGain = null, lastBgmBeatTime = 0;
        let playerIdentityName = "OPERATOR_1";
        let isLobbyLeader = false;

        window.startAudioAndGame = () => {
            const inputVal = document.getElementById('username-input').value.trim();
            if(inputVal !== "") { playerIdentityName = inputVal.toUpperCase(); }
            document.getElementById('start-prompt').style.display = 'none';
            setupSynthAudioEngine();
            init();
        };

        function setupSynthAudioEngine() {
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (AudioContextClass) {
                    audioCtx = new AudioContextClass();
                    masterGain = audioCtx.createGain();
                    masterGain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                    masterGain.connect(audioCtx.destination);
                }
            } catch(e) { console.error("Audio bypass setup issue:", e); }
        }

        function playSynthFX(freq, duration, type, volume) {
            if(!audioCtx || audioCtx.state === 'suspended') return;
            try {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = type || 'sawtooth';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(volume || 0.12, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gainNode).connect(masterGain);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(err) {}
        }

        function playSpatialZombieSound(zPos, freq, volume) {
            if(!audioCtx || !player || audioCtx.state === 'suspended') return;
            try {
                let relativeZ = zPos.clone().applyMatrix4(camera.matrixWorldInverse);
                let panValue = Math.max(-1, Math.min(1, relativeZ.x / 18)); 
                let dist = player.position.distanceTo(zPos);
                let targetVol = (1 - (dist / 45)) * (volume || 0.2);
                if (targetVol <= 0) return;

                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(targetVol, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(freq - 120, audioCtx.currentTime + 0.3);

                if (audioCtx.createStereoPanner) {
                    const panner = audioCtx.createStereoPanner();
                    panner.pan.setValueAtTime(panValue, audioCtx.currentTime);
                    osc.connect(gainNode).connect(panner).connect(masterGain);
                } else {
                    osc.connect(gainNode).connect(masterGain);
                }
                osc.start(); osc.stop(audioCtx.currentTime + 0.35);
            } catch(err) {}
        }

        function drawPurePlayerNameTag(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 256, 64);
            ctx.font = '900 22px "Courier New", monospace';
            ctx.fillStyle = '#00ffff'; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 128, 32);
            
            const texture = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(mat);
            sprite.scale.set(2.2, 0.55, 1);
            return sprite;
        }

        function initMultiplayer() {
            if(!window.db) return;
            
            const myPresenceRef = window.fbRef(window.db, 'players/' + myId);
            window.fbOnDisconnect(myPresenceRef).remove();

            window.fbOnValue(window.fbRef(window.db, 'matchState/currentLevel'), (snapshot) => {
                const val = snapshot.val();
                if(val && val !== currentLevel) {
                    currentLevel = val;
                    document.getElementById('lvl-ui').innerText = currentLevel;
                    spawnLevel();
                }
            });

            // 🟢 FIXED ENEMIES CORE TRACKING RECEIVER BLOCK
            window.fbOnValue(window.fbRef(window.db, 'matchState/zombies'), (snapshot) => {
                const data = snapshot.val() || {};
                let totalAliveZombies = Object.keys(data).length;
                
                for(let zId in data) {
                    let zData = data[zId];
                    
                    if(!zombies[zId]) {
                        let isBoss = zData.zType === 'BOSS';
                        const zMesh = createCharacter(0x44ff44, false, zData.zType);
                        zMesh.userData.zType = zData.zType;
                        zMesh.userData.isBoss = isBoss;
                        if(isBoss) zMesh.scale.set(7,7,7);
                        
                        scene.add(zMesh);
                        zombies[zId] = zMesh;
                    }
                    
                    zombies[zId].position.set(zData.x, zData.y, zData.z);
                    zombies[zId].lookAt(zData.tx, zData.y, zData.tz);
                    zombies[zId].userData.hp = zData.hp;
                    zombies[zId].userData.maxHp = zData.maxHp;
                    
                    let pct = (zData.hp / zData.maxHp) * 100;
                    drawZombieHealthBar(zombies[zId], Math.max(0, pct));
                    if(zData.zType === 'BOSS') {
                        document.getElementById('boss-hp').style.width = Math.max(0, pct) + "%";
                    }
                }

                for(let zId in zombies) {
                    if(!data[zId]) {
                        scene.remove(zombies[zId]);
                        delete zombies[zId];
                    }
                }

                if(totalAliveZombies === 0 && Object.keys(zombies).length === 0 && isLobbyLeader) {
                    if(currentLevel < 5) {
                        window.fbSet(window.fbRef(window.db, 'matchState/currentLevel'), currentLevel + 1);
                    } else {
                        document.getElementById('status-msg').innerText = "SQUAD VICTORY!"; 
                        document.getElementById('overlay').style.display = "flex"; 
                        window.fbSet(window.fbRef(window.db, 'matchState/currentLevel'), 1);
                    }
                }
            });

            window.fbOnValue(window.fbRef(window.db, 'bullets'), (snapshot) => {
                const data = snapshot.val() || {};
                for(let key in data) {
                    if(data[key].owner === myId) continue; 
                    
                    const remoteBulletMesh = new THREE.Mesh(new THREE.SphereGeometry(0.18), new THREE.MeshBasicMaterial({ color: 0xff3300 }));
                    remoteBulletMesh.position.set(data[key].x, data[key].y, data[key].z);
                    remoteBulletMesh.userData.velocity = new THREE.Vector3(data[key].vx, data[key].vy, data[key].vz);
                    remoteBulletMesh.userData.remoteInstance = true;
                    scene.add(remoteBulletMesh);
                    bullets.push(remoteBulletMesh);
                }
                if(Math.random() < 0.05) window.fbRemove(window.fbRef(window.db, 'bullets'));
            });

            window.fbOnValue(window.fbRef(window.db, 'players'), (snapshot) => {
                const data = snapshot.val() || {};
                const playerIds = Object.keys(data).sort();
                document.getElementById('count-ui').innerText = playerIds.length;
                
                isLobbyLeader = (playerIds[0] === myId);
                
                for(let id in data) {
                    if(id === myId) continue;
                    
                    if(!otherPlayers[id]) {
                        otherPlayers[id] = createCharacter(0x00ffcc, false, data[id].name || 'SQUAD');
                        
                        const fLight = new THREE.SpotLight(0xffffff, 0.0, 30, Math.PI / 6, 0.5, 1);
                        fLight.position.set(0, 1.5, 0);
                        otherPlayers[id].add(fLight);
                        otherPlayers[id].add(fLight.target);
                        otherPlayers[id].userData.flashlightComponent = fLight;
                        
                        const radNode = document.createElement('div');
                        radNode.className = 'radar-locator';
                        radNode.id = 'radar-' + id;
                        radNode.innerText = data[id].name || 'SQUAD';
                        document.getElementById('radar-container').appendChild(radNode);
                        otherPlayers[id].userData.radarElement = radNode;

                        scene.add(otherPlayers[id]);
                    }
                    
                    otherPlayers[id].position.set(data[id].x, data[id].y, data[id].z);
                    otherPlayers[id].rotation.y = data[id].ry;
                    otherPlayers[id].name = data[id].name || 'SQUAD';
                }
                for(let id in otherPlayers) {
                    if(!data[id]) {
                        if(otherPlayers[id].userData.radarElement) otherPlayers[id].userData.radarElement.remove();
                        scene.remove(otherPlayers[id]);
                        delete otherPlayers[id];
                    }
                }

                // 🟢 TRIGGER ENGINE RE-SYNC FOR FIRST LEADER SPAWN INSTANCE
                if(isLobbyLeader && Object.keys(zombies).length === 0) {
                    spawnLevel();
                }
            });
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa3b8cc); 
            scene.fog = new THREE.FogExp2(0xa3b8cc, 0.005);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            ambLight = new THREE.AmbientLight(0xffffff, 1.0); scene.add(ambLight);
            sun = new THREE.DirectionalLight(0xffffff, 1.0); sun.position.set(15, 60, 15); scene.add(sun);

            spotLight = new THREE.SpotLight(0xffffff, 15.0, 45, Math.PI / 5, 0.5, 1);
            spotLight.position.set(0, 1.5, 0);
            scene.add(spotLight); scene.add(spotLight.target);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x22252a, roughness: 0.8 }));
            ground.rotation.x = -Math.PI / 2; scene.add(ground);

            for(let i=0; i<35; i++) createBuilding(Math.random()*200-100, Math.random()*200-100);

            player = createCharacter(0x3b82f6, true, playerIdentityName); 
            player.position.set(0, 0, 0);
            scene.add(player);
            
            clock = new THREE.Clock();
            setupControls();

            if(window.db) {
                // Initialize presence update immediately to capture role initialization tracking
                window.fbUpdate(window.fbRef(window.db, 'players/' + myId), {
                    x: player.position.x, y: player.position.y, z: player.position.z,
                    ry: player.rotation.y, name: playerIdentityName
                }).then(() => {
                    initMultiplayer();
                });
            } else {
                spawnLevel();
            }
            animate();
        }

        function createBuilding(x, z) {
            const h = Math.random()*15+5;
            const b = new THREE.Mesh(new THREE.BoxGeometry(6, h, 6), new THREE.MeshStandardMaterial({ color: 0x3a3d45, roughness: 0.7 }));
            b.position.set(x, h/2, z); scene.add(b);
        }

        function drawZombieHealthBar(zGroup, percent) {
            const ctx = zGroup.userData.hpCtx; if(!ctx) return;
            ctx.clearRect(0, 0, 128, 32);
            ctx.fillStyle = 'rgba(30,0,0,0.85)'; ctx.fillRect(14, 8, 100, 14); 
            ctx.fillStyle = zGroup.userData.zType === 'SPITTER' ? '#10b981' : '#dc2626'; ctx.fillRect(14, 8, percent, 14); 
            zGroup.userData.hpSprite.material.map.needsUpdate = true;
        }

        function createCharacter(color, isMe, typeTag) {
            const group = new THREE.Group();
            let actualColor = color;
            
            if (!isMe && color === 0x44ff44) {
                let colors = { 'CREEPER': 0x2e3b2e, 'SPITTER': 0x0fba74, 'SPRINTER': 0xef4444, 'STALKER': 0x111116, 'BOSS': 0x5e0f0f };
                actualColor = colors[typeTag] || 0x2e3b2e;
            }

            const mat = new THREE.MeshStandardMaterial({ color: actualColor, roughness: 0.6 });
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1, 4, 8), mat); body.position.y = 0.9;
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.35), mat); head.position.y = 1.9;
            group.add(body, head);

            if(isMe || color === 0x00ffcc) {
                const gun = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.2, 0.9), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                gun.position.set(0.4, 1.2, -0.5); group.add(gun);
                
                const labelText = isMe ? playerIdentityName : typeTag;
                const overheadLabel = drawPurePlayerNameTag(labelText);
                overheadLabel.position.y = 2.6;
                group.add(overheadLabel);
            } else {
                const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 32;
                const ctx = canvas.getContext('2d');
                group.userData.hpCanvas = canvas; group.userData.hpCtx = ctx;
                const tex = new THREE.CanvasTexture(canvas);
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
                sprite.position.y = 2.6; sprite.scale.set(1.4, 0.35, 1);
                group.add(sprite); group.userData.hpSprite = sprite;
                
                if (color === 0x44ff44) drawZombieHealthBar(group, 100);
            }
            return group;
        }

        function spawnLevel() {
            for(let id in zombies) { scene.remove(zombies[id]); }
            zombies = {}; enemyProjectiles.forEach(p => scene.remove(p)); enemyProjectiles = [];

            let progressiveEnvironments = {
                1: { sky: 0xa3b8cc, fog: 0.005, view: 70, light: 1.0 },
                2: { sky: 0x445261, fog: 0.040, view: 40, light: 0.55 }, 
                3: { sky: 0x18261f, fog: 0.070, view: 30, light: 0.35 }, 
                4: { sky: 0x0f111a, fog: 0.015, view: 55, light: 0.85 }, 
                5: { sky: 0x2b0404, fog: 0.190, view: 12, light: 0.10 }  
            };

            let currentEnv = progressiveEnvironments[currentLevel] || progressiveEnvironments[1];
            visibilityRange = currentEnv.view;
            scene.background = new THREE.Color(currentEnv.sky);
            if(scene.fog) { scene.fog.color.setHex(currentEnv.sky); scene.fog.density = currentEnv.fog; }

            const isBoss = currentLevel === 5;
            document.getElementById('boss-hud').style.display = isBoss ? 'block' : 'none';

            if(window.db && isLobbyLeader) {
                window.fbSet(window.fbRef(window.db, 'matchState/zombies'), null);
                
                const count = isBoss ? 1 : 15; // Set explicitly to 15 flat as requested
                let types = ['CREEPER', 'SPITTER', 'SPRINTER', 'STALKER', 'BOSS'];
                let currentType = types[currentLevel - 1] || 'CREEPER';
                
                let initialZombiesBatch = {};
                for(let i=0; i<count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 35 + Math.random() * 30;
                    let zx = player.position.x + Math.cos(angle)*dist;
                    let zz = player.position.z + Math.sin(angle)*dist;
                    let zHp = isBoss ? 4000 : 30;
                    
                    let uniqueZId = "Z_" + i + "_" + Math.floor(Math.random()*999);
                    initialZombiesBatch[uniqueZId] = {
                        zType: currentType,
                        x: zx, y: 0, z: zz,
                        tx: 0, tz: 0,
                        hp: zHp, maxHp: zHp
                    };
                }
                window.fbSet(window.fbRef(window.db, 'matchState/zombies'), initialZombiesBatch);
            }
        }

        function setupControls() {
            const base = document.getElementById('joystick-base'), knob = document.getElementById('joystick-knob');
            base.addEventListener('touchstart', () => { joystick.active = true; });
            base.addEventListener('touchmove', (e) => {
                const t = e.touches[0], r = base.getBoundingClientRect();
                const dx = t.clientX - (r.left + 38), dy = t.clientY - (r.top + 38);
                const d = Math.min(Math.sqrt(dx*dx + dy*dy), 30);
                knob.style.transform = `translate(${dx*(d/30)}px, ${dy*(d/30)}px)`;
                joystick.x = dx/30; joystick.y = dy/30;
            });
            base.addEventListener('touchend', () => { joystick.active = false; joystick.x = 0; joystick.y = 0; knob.style.transform = 'translate(0,0)'; });
            
            window.addEventListener('touchstart', (e) => { if(e.touches[0].clientX > window.innerWidth/2) lastLookX = e.touches[0].clientX; });
            window.addEventListener('touchmove', (e) => {
                if(e.touches[0].clientX > window.innerWidth/2) {
                    const dx = e.touches[0].clientX - lastLookX; 
                    player.rotation.y -= dx * 0.025; 
                    lastLookX = e.touches[0].clientX;
                }
            });
            document.getElementById('fire-btn').addEventListener('touchstart', shoot);
        }

        function shoot() {
            if(isDowned) return;
            playSynthFX(520, 0.12, 'sawtooth', 0.15);

            const b = new THREE.Mesh(new THREE.SphereGeometry(0.18), new THREE.MeshBasicMaterial({ color: 0xffcc00 }));
            b.position.copy(player.position).add(new THREE.Vector3(0, 1.4, 0));
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
            b.userData.velocity = dir.multiplyScalar(1.5);
            b.userData.owner = myId;
            scene.add(b); 
            bullets.push(b);

            if(window.db) {
                window.fbPush(window.fbRef(window.db, 'bullets'), {
                    owner: myId,
                    x: b.position.x, y: b.position.y, z: b.position.z,
                    vx: b.userData.velocity.x, vy: b.userData.velocity.y, vz: b.userData.velocity.z
                });
            }
        }

        window.toggleFlashlight = () => { 
            if(batteryLife <= 0) return;
            flashlightPower = !flashlightPower; 
            playSynthFX(880, 0.04, 'sine', 0.2);
        };

        function animate() {
            requestAnimationFrame(animate);
            const now = clock.getElapsedTime();

            if(!player || isDowned) return;

            if(joystick.active) { player.translateX(joystick.x * 0.16); player.translateZ(joystick.y * 0.16); }

            if(window.db && Math.random() < 0.2) {
                window.fbUpdate(window.fbRef(window.db, 'players/' + myId), {
                    x: player.position.x, y: player.position.y, z: player.position.z,
                    ry: player.rotation.y, name: playerIdentityName
                });
            }

            let progressiveEnvironments = { 1:1.0, 2:0.55, 3:0.35, 4:0.85, 5:0.10 };
            let currentBaseLight = progressiveEnvironments[currentLevel] || 1.0;

            if (flashlightPower && batteryLife > 0) {
                batteryLife = Math.max(0, batteryLife - 0.035); 
                document.getElementById('bat-bar').style.width = batteryLife + "%";
                document.getElementById('bat-text').innerText = Math.floor(batteryLife) + "%";
                spotLight.intensity = 15.0; ambLight.intensity = currentBaseLight; sun.intensity = currentBaseLight;
            } else {
                spotLight.intensity = 0.0; ambLight.intensity = 0.20; sun.intensity = 0.20;
                document.getElementById('bat-text').innerText = batteryLife <= 0 ? "EMPTY" : "OFF";
            }

            spotLight.position.copy(player.position).add(new THREE.Vector3(0, 1.5, 0));
            let forwardVector = new THREE.Vector3(0, 0, -5).applyQuaternion(player.quaternion);
            spotLight.target.position.copy(player.position).add(forwardVector);

            // 🟢 FIXED RE-ALIGNED RADAR TRACKING MAPPER (Displays real custom identity name on distance label instead of generic squad phrase)
            for (let id in otherPlayers) {
                const remPlayer = otherPlayers[id];
                const radarElement = remPlayer.userData.radarElement;
                if (!radarElement) continue;

                let distanceToFriend = player.position.distanceTo(remPlayer.position);
                
                if (distanceToFriend > 20) {
                    let projVector = remPlayer.position.clone().add(new THREE.Vector3(0, 2, 0));
                    projVector.project(camera);

                    let sx = (projVector.x * .5 + .5) * window.innerWidth;
                    let sy = (projVector.y * -.5 + .5) * window.innerHeight;

                    sx = Math.max(25, Math.min(window.innerWidth - 35, sx));
                    sy = Math.max(25, Math.min(window.innerHeight - 35, sy));

                    radarElement.style.left = sx + 'px';
                    radarElement.style.top = sy + 'px';
                    radarElement.style.display = 'block';
                    radarElement.innerText = `${remPlayer.name || 'SQUAD'} [${Math.floor(distanceToFriend)}m]`;
                } else {
                    radarElement.style.display = 'none';
                }
            }

            if(window.db && isLobbyLeader) {
                let currentZombiesUpdates = {};
                let allActiveSquadPlayers = [];
                allActiveSquadPlayers.push({ id: myId, pos: player.position });
                for(let pId in otherPlayers) {
                    allActiveSquadPlayers.push({ id: pId, pos: otherPlayers[pId].position });
                }

                for(let zId in zombies) {
                    let zMesh = zombies[zId];
                    let closestTarget = null;
                    let minimumDistance = 99999;
                    
                    allActiveSquadPlayers.forEach(p => {
                        let d = zMesh.position.distanceTo(p.pos);
                        if(d < minimumDistance) {
                            minimumDistance = d;
                            closestTarget = p.pos;
                        }
                    });

                    if(closestTarget) {
                        let dirToTarget = new THREE.Vector3().subVectors(closestTarget, zMesh.position).normalize();
                        
                        let mSpeed = 0.015; 
                        if(zMesh.userData.zType === 'SPRINTER') mSpeed = 0.04; 
                        if(zMesh.userData.zType === 'BOSS') mSpeed = 0.02;
                        if(zMesh.userData.zType === 'SPITTER') mSpeed = 0.01;

                        zMesh.position.add(dirToTarget.multiplyScalar(mSpeed));
                        
                        currentZombiesUpdates[zId + '/x'] = zMesh.position.x;
                        currentZombiesUpdates[zId + '/y'] = zMesh.position.y;
                        currentZombiesUpdates[zId + '/z'] = zMesh.position.z;
                        currentZombiesUpdates[zId + '/tx'] = closestTarget.x;
                        currentZombiesUpdates[zId + '/tz'] = closestTarget.z;
                    }
                }
                if(Object.keys(currentZombiesUpdates).length > 0) {
                    window.fbUpdate(window.fbRef(window.db, 'matchState/zombies'), currentZombiesUpdates);
                }
            }

            for(let zId in zombies) {
                let z = zombies[zId];
                const targetDist = z.position.distanceTo(player.position);
                let maxVisibilityThreshold = visibilityRange;
                if (!flashlightPower || batteryLife <= 0) maxVisibilityThreshold = 15.0;

                z.visible = z.userData.isBoss ? true : (targetDist <= maxVisibilityThreshold);

                let attackRange = z.userData.isBoss ? 5.5 : 1.8;
                if(targetDist < attackRange) {
                    health -= z.userData.isBoss ? 1.5 : 0.8;
                    document.getElementById('hp-bar').style.width = Math.max(0, health) + "%";
                    if(health <= 0 && !isDowned) { 
                        isDowned = true; 
                        document.getElementById('overlay').style.display = "flex"; 
                    }
                }
            }

            for (let bi = bullets.length - 1; bi >= 0; bi--) {
                const b = bullets[bi]; b.position.add(b.userData.velocity); let hit = false;
                
                for (let zId in zombies) {
                    const z = zombies[zId]; let range = z.scale.x * 1.8;
                    if(b.position.distanceTo(z.position.clone().add(new THREE.Vector3(0, 1*z.scale.y, 0))) < range) {
                        hit = true;
                        let currentCalculatedHp = z.userData.hp - 25;
                        if(window.db) {
                            if(currentCalculatedHp <= 0) {
                                window.fbRemove(window.fbRef(window.db, 'matchState/zombies/' + zId));
                            } else {
                                window.fbSet(window.fbRef(window.db, 'matchState/zombies/' + zId + '/hp'), currentCalculatedHp);
                            }
                        }
                        break;
                    }
                }
                if(hit || b.position.distanceTo(player.position) > 90) { scene.remove(b); bullets.splice(bi, 1); }
            }

            const camPos = new THREE.Vector3(0, 5, 10).applyQuaternion(player.quaternion).add(player.position);
            camera.position.lerp(camPos, 0.1); camera.lookAt(player.position.clone().add(new THREE.Vector3(0,1.5,0)));
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
